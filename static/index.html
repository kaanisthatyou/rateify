<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>rateify ♪</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♪</text></svg>">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="mini-drag pywebview-drag-region grab" id="mini-drag" title="drag to move"></div>

<div class="win-ctls">
  <button id="win-min" data-i18n-title="min_title" title="minimize" aria-label="minimize">–</button>
  <button id="win-close" data-i18n-title="close_title" title="close" aria-label="close">✕</button>
</div>

<header>
  <div class="pywebview-drag-region grab brand">
    <h1 class="wordmark">rateify</h1>
  </div>
  <div id="mini-now" class="mini-now" title="tap to open">
    <img id="mini-cover-sm" class="mini-cover-sm" alt="">
    <span class="mini-info">
      <span id="mini-title" class="mini-title"></span>
      <span id="mini-artist" class="mini-artist"></span>
    </span>
    <span class="mini-eq" id="mini-eq"><i></i><i></i><i></i></span>
  </div>
  <nav class="tabs">
    <button class="tab active" data-view="now" data-i18n="tab_now" data-i18n-title="tab_hint" title="tap again to tuck the widget away">now</button>
    <button class="tab" data-view="shelf" data-i18n="tab_shelf" data-i18n-title="tab_hint" title="tap again to tuck the widget away">shelf</button>
    <button class="tab tab-gear" data-view="settings" data-i18n-title="tab_hint" title="tap again to tuck the widget away" aria-label="settings">⚙</button>
  </nav>
</header>

<main>

  <!-- ================= NOW ================= -->
  <section id="view-now">

    <div class="card now-card" id="now-card" hidden>
      <div class="cover-zone">
        <div class="vinyl" id="vinyl"><div class="vinyl-disc"></div></div>
        <div class="cover-frame">
          <span class="tape tape-tl"></span>
          <img id="cover" class="cover" alt="album cover">
          <div class="stamp" id="stamp" data-i18n="stamp_rated" hidden>RATED</div>
        </div>
      </div>

      <div class="track-meta">
        <h2 id="t-title">—</h2>
        <p id="t-artist" class="artist">—</p>
        <p id="t-album" class="album">—</p>
      </div>

      <div class="progress-zone">
        <span id="p-cur" class="ptime">0:00</span>
        <div class="pbar"><div id="p-fill" class="pfill"></div></div>
        <span id="p-dur" class="ptime">0:00</span>
      </div>

      <div class="controls">
        <button class="ctl" data-act="prev" data-i18n-title="prev_title" title="previous" aria-label="previous">
          <svg viewBox="0 0 24 24"><path d="M6 5h3v14H6zM20 5v14L9.5 12z"/></svg>
        </button>
        <button class="ctl ctl-big" data-act="playpause" data-i18n-title="playpause_title" title="play / pause" aria-label="play/pause">
          <svg id="icon-play" viewBox="0 0 24 24"><path d="M7 4l13 8-13 8z"/></svg>
          <svg id="icon-pause" viewBox="0 0 24 24" style="display:none"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg>
        </button>
        <button class="ctl" data-act="next" data-i18n-title="next_title" title="next" aria-label="next">
          <svg viewBox="0 0 24 24"><path d="M15 5h3v14h-3zM4 5v14l10.5-7z"/></svg>
        </button>
      </div>

      <div class="tear"></div>

      <button id="drawer-toggle" class="drawer-toggle">✎ rate this track ▾</button>

      <div class="rating-zone" id="rating-zone" hidden>
        <p class="rating-preview"><span id="r-label">pick a number…</span><span id="r-value" class="r-value"></span></p>

        <div class="pills" id="pills"></div>

        <div class="mods" id="mods">
          <button class="mod" data-mod="light" data-i18n="mod_light">light</button>
          <button class="mod active" data-mod="just" data-i18n="mod_just">just</button>
          <button class="mod" data-mod="strong" data-i18n="mod_strong">strong</button>
        </div>

        <textarea id="note" class="note" rows="2" data-i18n-placeholder="note_placeholder" placeholder="scribble a note… (why this number?)"></textarea>

        <button id="save" class="save-btn">✦ stamp it</button>
      </div>
    </div>

    <div class="card empty-card" id="now-empty">
      <p class="empty-big" data-i18n="empty_now_big">nothing spinning</p>
      <p class="empty-small" data-i18n="empty_now_small">put a record on in spotify &amp; it shows up here ♪</p>
    </div>

  </section>

  <!-- ================ SHELF ================ -->
  <section id="view-shelf" hidden>
    <div id="shelf-grid" class="shelf-grid"></div>
    <div class="card empty-card" id="shelf-empty" hidden>
      <p class="empty-big" data-i18n="shelf_empty_big">bare shelves</p>
      <p class="empty-small" data-i18n="shelf_empty_small">no verdicts yet — go judge something</p>
    </div>
  </section>

  <!-- ================ SETTINGS ================ -->
  <section id="view-settings" hidden>
    <div class="card settings-card">
      <p class="settings-label" data-i18n="settings_lang_label">language</p>
      <div class="pills lang-pills" id="lang-pills">
        <button class="pill lang-pill" data-lang="en">EN</button>
        <button class="pill lang-pill" data-lang="tr">TR</button>
        <button class="pill lang-pill" data-lang="es">ES</button>
        <button class="pill lang-pill" data-lang="ja">JA</button>
        <button class="pill lang-pill" data-lang="zh">中</button>
      </div>

      <div class="tear"></div>

      <p class="settings-label" data-i18n="settings_theme_label">color theme</p>
      <div class="theme-swatches" id="theme-swatches">
        <button class="swatch" data-theme="classic" title="classic"></button>
        <button class="swatch" data-theme="noir" title="noir"></button>
        <button class="swatch" data-theme="mint" title="mint"></button>
        <button class="swatch" data-theme="berry" title="berry"></button>
        <button class="swatch" data-theme="ocean" title="ocean"></button>
      </div>
    </div>
  </section>

</main>

<script src="app.js"></script>
</body>
</html>
